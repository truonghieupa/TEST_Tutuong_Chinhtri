          { name: "Vô chính phủ Xanh (Eco-Anarchism)", nameEn: "Eco-Anarchism", description: "Chống công nghiệp hóa, tư bản và nhà nước. Con người phải hòa hợp tuyệt đối với thiên nhiên.", descriptionEn: "Anti-industrialization, anti-capitalism, and anti-state. Humans must live in absolute harmony with nature.", stats: { power: -10, diplomatic: -8, military: -9, economic: -8, cultural: -8 } },
          { name: "Vô chính phủ Nguyên thủy (Anarcho-Primitivism)", nameEn: "Anarcho-Primitivism", description: "Đập bỏ máy móc, văn minh công nghiệp, đưa con người về lối sống săn bắt hái lượm.", descriptionEn: "Destroy machines and industrial civilization, returning humans to a hunter-gatherer lifestyle.", stats: { power: -10, diplomatic: -8, military: -8, economic: -10, cultural: 10, societal: 0 } },
          { name: "Vô chính phủ Cá nhân (Individualist Anarchism)", nameEn: "Individualist Anarchism", description: "Tôn thờ tự do cá nhân tuyệt đối. Thích thị trường trao đổi, nhưng chống nhà nước và bạo lực tập thể.", descriptionEn: "Worships absolute individual freedom. Likes exchange markets, but opposes the state and collective violence.", stats: { power: -10, civil: -10, economic: 0, cultural: -6 } },
          { name: "Chủ nghĩa George (Georgism)", nameEn: "Georgism", description: "Không thu thuế thu nhập, nhưng đánh thuế 100% vào sở hữu đất đai để chia cổ tức cho toàn dân.", descriptionEn: "No income tax, but 100% tax on land ownership to pay dividends to all citizens.", stats: { power: -5, economic: 2, cultural: -2 } },
          { name: "Tự do Cổ điển Bảo thủ (Paleolibertarianism)", nameEn: "Paleolibertarianism", description: "Nhà nước vô chính phủ, nhưng lối sống cực kỳ bảo thủ, bài trừ đa dạng giới, đề cao tôn giáo.", descriptionEn: "Anarchist state, but extremely conservative lifestyle, rejecting gender diversity, promoting religion.", stats: { power: -8, political: -5, civil: -8, economic: 9, religious: 7, cultural: 8, societal: 7 } },
          { name: "Vô chính phủ Dân tộc (National Anarchism)", nameEn: "National Anarchism", description: "Lập công xã tự quản, nhưng các công xã phải phân chia nghiêm ngặt tuyệt đối theo chủng tộc.", descriptionEn: "Establish self-governing communes, but they must be strictly divided by race (Segregation).", stats: { power: -9, civil: -5, economic: -6, cultural: 8, societal: 10 } },
          { name: "Vô chính phủ Thị trường Cánh tả (Left-Market Anarchism)", nameEn: "Left-Market Anarchism", description: "Thị trường tự do thực sự sẽ tiêu diệt tư bản độc quyền. Hợp tác xã công nhân tự do buôn bán.", descriptionEn: "True free markets will destroy monopoly capitalism. Worker cooperatives trade freely.", stats: { power: -9, civil: -9, economic: 2, cultural: -5 } },
          { name: "Vô chính phủ Đồng tính (Queer Anarchism)", nameEn: "Queer Anarchism", description: "Gắn liền đập bỏ nhà nước với việc xóa bỏ hoàn toàn khái niệm giới tính (nam/nữ) và chuẩn mực dị tính.", descriptionEn: "Links smashing the state with completely erasing gender concepts (male/female) and heteronormativity.", stats: { power: -10, civil: -10, religious: -10, cultural: -10, societal: -8 } },
          { name: "Vô chính phủ Biên viễn (Anarcho-Frontierism)", nameEn: "Anarcho-Frontierism", description: "Tự do tuyệt đối tồn tại ở miền Tây hoang dã hay không gian vũ trụ, nơi luật pháp chưa vươn tới.", descriptionEn: "Absolute freedom exists only in the Wild West or outer space, where laws have not reached.", stats: { power: -10, civil: -10, economic: 7, cultural: -2 } },
          { name: "Độc tài Vị quốc (Authoritarian Nationalism)", nameEn: "Authoritarian Nationalism", description: "Quốc gia trên hết. Nhà nước mạnh tay dẹp bất đồng, ưu tiên quân sự và đồng hóa ngoại lai.", descriptionEn: "Nation first. The state forcefully suppresses dissent, prioritizes military, and assimilates foreigners.", stats: { power: 9, political: 9, diplomatic: 9, military: 8, civil: 8, societal: 9 } },
          { name: "Bảo thủ Truyền thống (Traditional Conservatism)", nameEn: "Traditional Conservatism", description: "Đề cao ổn định xã hội, gia đình cốt lõi, vai trò tôn giáo và bảo vệ văn hóa quốc gia.", descriptionEn: "Promotes social stability, nuclear family, role of religion, and protection of national culture.", stats: { power: 4, diplomatic: 6, economic: 5, religious: 7, cultural: 7, societal: 6 } },
          { name: "Chủ nghĩa Phát xít (Fascism)", nameEn: "Fascism", description: "Quyền lực tối thượng thuộc Nhà nước. Quân sự hóa toàn dân, đề cao thượng đẳng dân tộc.", descriptionEn: "Supreme power belongs to the State. Militarization of all citizens, promoting ethnic superiority.", stats: { power: 10, political: 10, diplomatic: 10, military: 10, civil: 10, religious: 2, cultural: 9, societal: 10 } },
          { name: "Phát xít Giáo quyền (Clerical Fascism)", nameEn: "Clerical Fascism", description: "Phát xít độc tài, Lãnh tụ là giáo chủ, cai trị bằng luật pháp tôn giáo hà khắc và quân đội.", descriptionEn: "Dictatorial fascism, the Leader is the cleric, ruling through harsh religious law and the military.", stats: { power: 10, political: 10, military: 8, civil: 10, religious: 10, cultural: 10, societal: 10 } },
          { name: "Phát xít Sinh thái (Eco-Fascism)", nameEn: "Eco-Fascism", description: "Dùng độc tài quân sự, thanh lọc dân số tàn nhẫn chỉ để bảo vệ môi trường và thiên nhiên.", descriptionEn: "Uses military dictatorship and ruthless population purges purely to protect the environment and nature.", stats: { power: 10, political: 10, diplomatic: 9, military: 8, civil: 9, economic: 0, cultural: 9, societal: 10 } },
          { name: "Chủ nghĩa Thần quyền (Theocracy)", nameEn: "Theocracy", description: "Nhà nước và tôn giáo là một. Luật pháp viết dựa trên giáo lý, giáo sĩ cai trị tuyệt đối.", descriptionEn: "State and religion are one. Laws are based on dogma, clerics rule absolutely.", stats: { power: 9, political: 9, civil: 9, religious: 10, cultural: 10, societal: 8 } },
          { name: "Quân chủ Chuyên chế (Absolute Monarchism)", nameEn: "Absolute Monarchism", description: "Vua/Nữ hoàng nắm quyền tối cao. Không có dân chủ, người dân phải tuyệt đối trung thành.", descriptionEn: "King/Queen holds supreme power. No democracy, citizens must be absolutely loyal.", stats: { power: 10, political: 10, military: 6, civil: 8, religious: 8, cultural: 9 } },
          { name: "Tân Bảo thủ (Neo-Conservatism)", nameEn: "Neo-Conservatism", description: "Sẵn sàng sử dụng quân sự áp đảo và can thiệp ngoại giao để xuất khẩu giá trị phương Tây.", descriptionEn: "Willing to use overwhelming military force and diplomatic intervention to export Western values.", stats: { diplomatic: 8, military: 9, economic: 5, cultural: 5, societal: 4 } },
          { name: "Dân túy Cánh hữu (Right-Wing Populism)", nameEn: "Right-Wing Populism", description: "Chống giới tinh hoa. Bài trừ nhập cư, đề cao dân tộc, bảo hộ kinh tế và truyền thống.", descriptionEn: "Anti-elite. Anti-immigration, promotes nationalism, economic protectionism, and tradition.", stats: { power: 3, political: -2, diplomatic: 8, economic: 2, cultural: 7, societal: 8 } },
          { name: "Độc tài Khai sáng (Enlightened Absolutism)", nameEn: "Enlightened Absolutism", description: "Nhà độc tài có học thức nắm toàn quyền, dùng quyền lực thúc đẩy khoa học và cải cách xã hội.", descriptionEn: "An educated dictator holds absolute power, using it to advance science and social reform.", stats: { power: 9, political: 9, civil: 4, religious: -5, cultural: -6 } },
          { name: "Chủ nghĩa Quân phiệt (Stratocracy)", nameEn: "Stratocracy / Militarism", description: "Xã hội là doanh trại quân đội. Quân đội là nhà nước, chỉ quân nhân mới có quyền công dân.", descriptionEn: "Society is a military camp. The army is the state, only soldiers have citizenship rights.", stats: { power: 9, political: 8, diplomatic: 8, military: 10, civil: 9, cultural: 6 } },
          { name: "Thuyết Darwin Xã hội (Social Darwinism)", nameEn: "Social Darwinism", description: "Kẻ mạnh do gen tốt, kẻ yếu phải bị đào thải. Phản đối mọi phúc lợi xã hội cứu giúp kẻ yếu.", descriptionEn: "The strong succeed due to good genes, the weak must perish. Opposes all welfare for the weak.", stats: { power: 5, civil: 6, economic: 10, cultural: 8, societal: 10 } },
          { name: "Chủ nghĩa Toàn trị (Totalitarianism)", nameEn: "Totalitarianism", description: "Mô hình cai trị tột đỉnh: Nhà nước kiểm soát mọi khía cạnh đời sống, suy nghĩ và kinh tế.", descriptionEn: "Ultimate ruling model: The state completely controls all aspects of life, thoughts, and economy.", stats: { power: 10, political: 10, civil: 10, cultural: 5 } },
          { name: "Chủ nghĩa Marx - Lenin (Marxism-Leninism)", nameEn: "Marxism-Leninism", description: "Nhà nước mạnh mẽ nắm quyền kiểm soát tư liệu sản xuất để đạt bình đẳng tuyệt đối, bài trừ tôn giáo.", descriptionEn: "Strong state controls the means of production to achieve absolute equality, abolishing religion.", stats: { power: 8, political: 8, economic: -10, religious: -8, civil: 6 } },
          { name: "Chủ nghĩa Mao (Maoism)", nameEn: "Maoism", description: "Cực tả độc quyền, cách mạng bạo lực nông dân và sẵn sàng phá hủy toàn bộ văn hóa cũ.", descriptionEn: "Authoritarian far-left, violent peasant revolution, willing to destroy all old culture.", stats: { power: 9, political: 9, diplomatic: 8, economic: -10, religious: -9, cultural: -9, societal: 8 } },
          { name: "Chủ nghĩa Trotsky (Trotskyism)", nameEn: "Trotskyism", description: "Cực tả chống Stalin. Xuất khẩu cộng sản ra toàn cầu bằng mọi giá qua 'Cách mạng thường trực'.", descriptionEn: "Far-left anti-Stalinist. Export communism globally at all costs via 'Permanent Revolution'.", stats: { power: 7, political: 6, diplomatic: -10, economic: -10, religious: -8, cultural: -6 } },
          { name: "Quốc gia Bolshevik (Nazbol)", nameEn: "National Bolshevism (Nazbol)", description: "Kinh tế cực tả (Cộng sản) nhưng văn hóa và ngoại giao cực hữu (Phân biệt chủng tộc, dân tộc tính).", descriptionEn: "Far-left economics (Communism) but far-right culture and diplomacy (Racism, ultra-nationalism).", stats: { power: 9, political: 9, diplomatic: 9, economic: -10, religious: 5, cultural: 9, societal: 10 } },
          { name: "Quân chủ Xã hội Chủ nghĩa (Monarcho-Socialism)", nameEn: "Monarcho-Socialism", description: "Quyền lực thuộc Nhà vua độc quyền, nhưng Nhà vua phân phối tài sản theo hướng Xã hội chủ nghĩa.", descriptionEn: "Power belongs to an absolute monarch, but the monarch redistributes wealth in a socialist manner.", stats: { power: 8, political: 10, economic: -8, cultural: 5 } },
          { name: "Tự do Chống Tôn giáo (State Atheism)", nameEn: "State Atheism", description: "Nhà nước sử dụng quyền lực đàn áp tổ chức tôn giáo và truyền bá vô thần hóa toàn dân.", descriptionEn: "The state uses power to suppress religious organizations and spread atheism to all citizens.", stats: { power: 6, civil: 5, religious: -10, cultural: -6 } },
          { name: "Chủ nghĩa Tân tự do (Neoliberalism)", nameEn: "Neoliberalism", description: "Thị trường tự do, tư nhân hóa và toàn cầu hóa. Chỉ cần kinh tế không bị cản trở.", descriptionEn: "Free markets, privatization, and globalization. The economy must not be hindered.", stats: { diplomatic: -6, economic: 8, cultural: -2, civil: -3 } },
          { name: "Tư bản Nhà nước (State Capitalism)", nameEn: "State Capitalism", description: "Kinh tế mở cửa, tư bản hóa mạnh mẽ, nhưng hệ thống chính trị do một đảng kiểm soát chặt chẽ.", descriptionEn: "Open economy, strong capitalization, but the political system is strictly controlled by one party.", stats: { power: 8, political: 8, civil: 7, economic: 5, cultural: 2 } },
          { name: "Chủ nghĩa Kỹ trị (Technocracy)", nameEn: "Technocracy", description: "Đất nước phải được giao cho các nhà khoa học, kỹ sư và chuyên gia trị vì.", descriptionEn: "The country must be ruled by scientists, engineers, and experts.", stats: { power: 5, political: 7, civil: 2, religious: -8, cultural: -5 } },
          { name: "Chủ nghĩa Khách quan (Objectivism)", nameEn: "Objectivism", description: "Đề cao ích kỷ hợp lý. Chỉ có tư bản tuyệt đối mới bảo vệ trí tuệ cá nhân khỏi đám đông.", descriptionEn: "Promotes rational selfishness. Only absolute capitalism protects individual intellect from the mob.", stats: { power: -7, civil: -8, economic: 10, religious: -9, cultural: -4 } },
          { name: "Chủ nghĩa Nông nghiệp (Agrarianism)", nameEn: "Agrarianism", description: "Xã hội nông thôn với nông dân tự do làm chủ đất đai là hình mẫu lý tưởng.", descriptionEn: "Rural society with free farmers owning their land is the ideal model.", stats: { power: -3, economic: 2, religious: 4, cultural: 6, societal: 3 } },
          { name: "Siêu nhân loại (Transhumanism)", nameEn: "Transhumanism", description: "Dùng công nghệ gen, cyborg, AI để tiến hóa con người vượt qua mọi giới hạn sinh học.", descriptionEn: "Use genetic engineering, cyborgs, and AI to evolve humans past all biological limits.", stats: { power: -2, civil: -4, religious: -10, cultural: -10, societal: -6 } },
          { name: "Tân Luddite (Neo-Luddism)", nameEn: "Neo-Luddism", description: "Cực kỳ căm ghét và chống lại AI, tự động hóa và sự phụ thuộc vào công nghệ số.", descriptionEn: "Extremely hates and opposes AI, automation, and reliance on digital technology.", stats: { power: 2, economic: -5, cultural: 8 } },
          { name: "Tư bản Hồng (Pink Capitalism)", nameEn: "Pink Capitalism", description: "Tư bản thị trường nhưng chủ động vay mượn phong trào LGBTQ+ để thương mại hóa kiếm tiền.", descriptionEn: "Market capitalism that actively co-opts LGBTQ+ movements for commercial profit.", stats: { diplomatic: -6, economic: 9, religious: -7, cultural: -9, societal: -8 } },
          { name: "Chủ nghĩa Trọng thương (Mercantilism)", nameEn: "Mercantilism", description: "Nhà nước can thiệp kinh tế, dùng thuế quan cao tối đa hóa xuất khẩu, tích lũy tài sản.", descriptionEn: "State intervenes in economy, using high tariffs to maximize exports and accumulate wealth.", stats: { power: 6, diplomatic: 8, economic: -4 } },
          { name: "Chủ nghĩa Trộm cướp (Kleptocracy)", nameEn: "Kleptocracy", description: "Hệ thống cầm quyền tham nhũng, nhà nước vận hành để bòn rút tài nguyên làm giàu cá nhân.", descriptionEn: "Corrupt ruling system, state operates to siphon resources to enrich individuals.", stats: { power: 8, political: 8, civil: 6, economic: 4 } },
          { name: "Chủ nghĩa Thân hữu (Crony Capitalism)", nameEn: "Crony Capitalism", description: "Tập đoàn độc quyền thâu tóm nhà nước, viết luật để tiêu diệt đối thủ nhỏ lẻ và bóc lột.", descriptionEn: "Monopolies capture the state, writing laws to destroy small competitors and exploit.", stats: { power: 6, political: 7, civil: 5, economic: 9 } },
          { name: "Tư bản Sinh thái (Eco-Capitalism)", nameEn: "Eco-Capitalism", description: "Bảo vệ môi trường không cần cấm đoán. Để thị trường tự do, công ty công nghệ xanh tự giải quyết.", descriptionEn: "Protect environment without bans. Leave it to free markets, green tech companies will solve it.", stats: { power: -3, civil: -2, economic: 8, cultural: -3 } },
          { name: "Bảo thủ Sinh học (Bioconservatism)", nameEn: "Bioconservatism", description: "Cấm can thiệp gen, cấy ghép chip. Cơ thể và DNA tự nhiên của con người là thiêng liêng.", descriptionEn: "Ban gene editing and chip implants. The natural human body and DNA are sacred.", stats: { power: 4, civil: 5, religious: 6, cultural: 9 } },
          { name: "Hậu Nhân loại (Post-Humanism)", nameEn: "Post-Humanism", description: "Mục tiêu xóa bỏ hoàn toàn sinh học con người để tiến hóa thành loài mới bằng máy móc/năng lượng.", descriptionEn: "Goal to completely abolish human biology to evolve into a new species via machines/energy.", stats: { power: -4, civil: -5, religious: -10, cultural: -10 } },
          { name: "Sinh thái học Sâu (Deep Ecology)", nameEn: "Deep Ecology", description: "Quyền động thực vật quan trọng hơn nhân quyền. Sẵn sàng giảm dân số để cứu thiên nhiên.", descriptionEn: "Rights of flora/fauna supersede human rights. Willing to reduce population to save nature.", stats: { power: 5, economic: -9, religious: -5, cultural: -7 } },
          { name: "Cai trị bằng Thuật toán (Cyberocracy)", nameEn: "Cyberocracy", description: "Con người tham nhũng. Đất nước giao cho Siêu AI và thuật toán điều hành lạnh lùng.", descriptionEn: "Humans are corrupt. The country is handed over to Super AI and algorithms to run coldly.", stats: { power: 8, political: 9, civil: 6, religious: -8, cultural: -6 } },
          { name: "Môi trường Tự do (Free-Market Environmentalism)", nameEn: "Free-Market Environmentalism", description: "Môi trường được bảo vệ tốt nhất khi tư nhân hóa tự nhiên và áp dụng quyền tài sản nghiêm ngặt.", descriptionEn: "Environment is best protected by privatizing nature and applying strict property rights.", stats: { power: -5, economic: 9, cultural: -2 } },
          { name: "Chủ nghĩa Hòa bình (Pacifism)", nameEn: "Pacifism", description: "Tuyệt đối phản đối chiến tranh. Quân đội phải bị giải tán, mọi xung đột giải quyết bằng thương lượng.", descriptionEn: "Absolutely opposes war. Armies must be disbanded, all conflicts solved by negotiation.", stats: { power: -4, diplomatic: -7, military: -10, civil: -5, cultural: -4 } },
          { name: "Chủ nghĩa Thế giới (Cosmopolitanism)", nameEn: "Cosmopolitanism", description: "Đề cao danh tính 'Công dân toàn cầu' vượt lên quốc tịch hay dân tộc, xóa ranh giới.", descriptionEn: "Promotes 'Global Citizen' identity above nationality or ethnicity, erasing borders.", stats: { diplomatic: -10, military: -8, cultural: -7, societal: -10 } },
          { name: "Nhân bản Thế tục (Secular Humanism)", nameEn: "Secular Humanism", description: "Lấy con người và khoa học làm trung tâm, sống có đạo đức bằng lý trí không cần tôn giáo.", descriptionEn: "Human and science-centered, living ethically by reason without the need for religion.", stats: { power: -3, political: -6, civil: -7, religious: -10, cultural: -8, societal: -8 } },
          { name: "Chủ nghĩa Biệt lập (Isolationism)", nameEn: "Isolationism", description: "Tập trung nội bộ. Rút khỏi hiệp ước quốc tế và từ chối can thiệp ngoại giao.", descriptionEn: "Focus internally. Withdraw from international treaties and refuse diplomatic intervention.", stats: { diplomatic: 10, military: -5, economic: 6, societal: 8 } },
          { name: "Tự trị Địa phương (Communalism)", nameEn: "Communalism", description: "Quyền lực phân tán về làng xã tự quản. Tự tổ chức kinh tế và bầu cử mặt đối mặt.", descriptionEn: "Power distributed to self-governing villages. Self-organized economy and face-to-face elections.", stats: { power: -9, political: -9, economic: -6, societal: -2 } },
          { name: "Liên bang Dân chủ (Democratic Confederalism)", nameEn: "Democratic Confederalism", description: "Không nhà nước quốc gia. Xã hội vận hành bằng hội đồng cơ sở có mặt phụ nữ và thiểu số.", descriptionEn: "No nation-state. Society run by grassroots councils including women and minorities.", stats: { power: -8, political: -9, diplomatic: -6, civil: -6, economic: -6, cultural: -6 } },
          { name: "Chủ nghĩa Linh hồn (Soulism)", nameEn: "Soulism", description: "Các định luật vật lý như trọng lực cũng là áp bức. Dùng công nghệ/tâm linh giải phóng khỏi thực tại.", descriptionEn: "Physical laws like gravity are oppression. Use tech/spirituality to break free from reality.", stats: { power: -10, civil: -10, economic: -10, religious: -10, cultural: -10 } },
          { name: "Độc tài Phúc lợi (Social Authoritarianism)", nameEn: "Social Authoritarianism", description: "Kinh tế mở, phúc lợi tốt, nhưng chính trị và quyền tự do ngôn luận bị kiểm soát gắt gao.", descriptionEn: "Open economy, good welfare, but politics and free speech are strictly controlled.", stats: { power: 7, political: 7, civil: 8, economic: -2, cultural: 2, societal: 4 } },
          { name: "Chủ nghĩa Posadas (Posadism)", nameEn: "Posadism", description: "Tin rằng Chiến tranh hạt nhân và Người ngoài hành tinh mới tạo ra Xã hội Cộng sản hoàn hảo.", descriptionEn: "Believes Nuclear War and Aliens will create the perfect Communist Society.", stats: { power: 8, diplomatic: -10, military: 10, economic: -10, religious: -10, cultural: -8 } },
          { name: "Dân chủ Phi tự do (Illiberal Democracy)", nameEn: "Illiberal Democracy", description: "Có bầu cử, nhưng chính phủ hạn chế tự do báo chí, độc quyền kiểm soát thông tin triệt tiêu đối lập.", descriptionEn: "Has elections, but the government restricts press freedom, monopolizing information.", stats: { political: 5, civil: 7, cultural: 4 } },
          { name: "Chủ nghĩa Kemal (Kemalism)", nameEn: "Kemalism", description: "Độc tài quốc gia, nhưng ép buộc thế tục hóa triệt để và hiện đại hóa văn hóa phương Tây.", descriptionEn: "National dictatorship, but forces radical secularization and Western modernization.", stats: { power: 6, political: 4, diplomatic: 6, religious: -10, cultural: -5, societal: 6 } },
          { name: "Chủ nghĩa Peron (Peronism)", nameEn: "Peronism", description: "Kinh tế bảo vệ công nhân, nhưng chính trị độc tài, sùng bái cá nhân và quốc gia cực hữu.", descriptionEn: "Pro-worker economy, but dictatorial politics, cult of personality, and far-right nationalism.", stats: { power: 7, political: 5, economic: -6, cultural: 4, societal: 7 } },
          { name: "Chủ nghĩa Ba'ath (Ba'athism)", nameEn: "Ba'athism", description: "Chủ nghĩa dân tộc Arab kết hợp với kinh tế XHCN nhà nước và một đảng độc tài, thế tục.", descriptionEn: "Arab nationalism combined with state socialist economics and a dictatorial secular party.", stats: { power: 8, political: 8, diplomatic: 7, economic: -5, religious: -6, societal: 8 } },
          { name: "Chủ nghĩa Tito (Titoism)", nameEn: "Titoism", description: "Cộng sản độc lập. Ủng hộ thị trường XHCN, mở cửa ngoại giao và phi tập trung hóa.", descriptionEn: "Independent communism. Supports socialist markets, open diplomacy, and decentralization.", stats: { power: 5, political: 6, diplomatic: -4, economic: -3, cultural: -2 } },
          { name: "Chủ nghĩa Chỉ đạo (Dirigisme)", nameEn: "Dirigisme", description: "Kinh tế thị trường tư bản, nhưng Nhà nước can thiệp sâu quy hoạch công nghiệp mũi nhọn.", descriptionEn: "Capitalist market economy, but State intervenes deeply in planning key industries.", stats: { power: 5, economic: 2, diplomatic: 4 } },
          { name: "Tự do Trắc ẩn (Bleeding-Heart Libertarianism)", nameEn: "Bleeding-Heart Libertarianism", description: "Thị trường tự do tuyệt đối vì tin rằng chỉ có thị trường tự do mới giúp đỡ người nghèo hiệu quả nhất.", descriptionEn: "Absolute free market, believing it's the most effective way to help the poor.", stats: { power: -7, civil: -6, economic: 7, cultural: -4 } },
          { name: "Tự do Quốc gia (National Liberalism)", nameEn: "National Liberalism", description: "Tự do kinh tế cá nhân, nhưng đòi hỏi biên giới đóng kín và bản sắc dân tộc đồng nhất.", descriptionEn: "Individual economic freedom, but demands closed borders and uniform national identity.", stats: { power: -4, diplomatic: 7, economic: 5, societal: 8 } },
          { name: "Chủ nghĩa Cộng đồng (Communitarianism)", nameEn: "Communitarianism", description: "Cá nhân không thể độc lập mà phải gắn liền với trách nhiệm, nghĩa vụ đạo đức của cộng đồng.", descriptionEn: "Individuals cannot be independent but are tied to community responsibilities and morals.", stats: { power: 3, civil: 4, cultural: 5, societal: 4 } },
          { name: "Cộng hòa Dân sự (Civic Republicanism)", nameEn: "Civic Republicanism", description: "Tự do là sự tham gia tích cực của công dân vào chính trị để ngăn chặn tham nhũng, độc tài.", descriptionEn: "Freedom is citizens' active participation in politics to prevent corruption and dictatorship.", stats: { power: -4, political: -7, civil: -5, cultural: 2 } },
          { name: "Bảo thủ Trắc ẩn (Compassionate Conservatism)", nameEn: "Compassionate Conservatism", description: "Văn hóa truyền thống, nhưng dùng các tổ chức tôn giáo, từ thiện tư nhân để giúp người nghèo.", descriptionEn: "Traditional culture, but uses religious orgs and private charity to help the poor.", stats: { power: -2, economic: 4, religious: 6, cultural: 5 } },
          { name: "Vô chính phủ Tôn giáo (Religious Anarchism)", nameEn: "Religious Anarchism", description: "Bác bỏ nhà nước vì tin rằng chỉ Thượng đế mới có quyền phán xét; luật pháp con người là báng bổ.", descriptionEn: "Rejects the state, believing only God can judge; human law is blasphemy.", stats: { power: -10, civil: -10, economic: -5, religious: 10, cultural: 4 } },
          { name: "Dân chủ Hồi giáo (Islamic Democracy)", nameEn: "Islamic Democracy", description: "Bầu cử tự do, nhưng mọi đạo luật được thông qua tuyệt đối không được trái với luật Sharia.", descriptionEn: "Free elections, but laws passed absolutely must not contradict Sharia law.", stats: { power: 0, political: -6, civil: 4, religious: 9, cultural: 8, societal: 6 } },
          { name: "Dân chủ Cấp tiến (Radical Democracy)", nameEn: "Radical Democracy", description: "Dân chủ trực tiếp ở mọi nơi: Không chỉ thùng phiếu, mà phải áp dụng cả trong trường học, công xưởng.", descriptionEn: "Direct democracy everywhere: Not just ballot boxes, but applied in schools, factories.", stats: { power: -6, political: -10, economic: -6, cultural: -5 } },
          { name: "Xã hội Chủ nghĩa Sinh thái (Eco-Socialism)", nameEn: "Eco-Socialism", description: "Tư bản tàn phá môi trường. Chỉ có kinh tế kế hoạch phân phối lại mới cứu được Trái Đất.", descriptionEn: "Capitalism destroys the environment. Only a planned redistributive economy can save Earth.", stats: { power: 4, economic: -9, cultural: -4, societal: -3 } },
          { name: "XHCN Nông nghiệp (Agrarian Socialism)", nameEn: "Agrarian Socialism", description: "Lấy nông dân làm gốc. Tịch thu đất đai của địa chủ để chia đều cho hộ nông dân canh tác nhỏ.", descriptionEn: "Farmer-centric. Confiscate landlord land to divide equally among small farming households.", stats: { power: 2, economic: -8, cultural: 5, societal: 2 } },
          { name: "Chủ nghĩa Bảo hộ (Protectionism)", nameEn: "Protectionism", description: "Mọi chính sách phục vụ mục đích: Đóng cửa thị trường, áp thuế cao để bảo vệ ngành sản xuất nội địa.", descriptionEn: "Policies serve one goal: Close markets, high tariffs to protect domestic manufacturing.", stats: { diplomatic: 9, economic: -3, societal: 4 } },
          { name: "Chủ nghĩa Cải lương (Reformism)", nameEn: "Reformism", description: "Chấp nhận hệ thống hiện tại, thay đổi cực kỳ chậm rãi qua đạo luật, chống cách mạng bạo lực.", descriptionEn: "Accepts the current system, changes extremely slowly via laws, anti-violent revolution.", stats: { power: 1, political: -2, military: -5, economic: -1, cultural: -1 } },
          { name: "Độc tài Công nghệ (Techno-Authoritarianism)", nameEn: "Techno-Authoritarianism", description: "Sử dụng AI, Big Data, điểm tín nhiệm xã hội để kiểm soát toàn diện tư tưởng và hành vi.", descriptionEn: "Uses AI, Big Data, social credit scores for comprehensive control of thoughts and behavior.", stats: { power: 10, political: 9, civil: 10, cultural: -2 } },
          { name: "Tư bản Phúc lợi (Welfare Capitalism)", nameEn: "Welfare Capitalism", description: "Công ty tư nhân chủ động cung cấp bảo hiểm, nhà ở cho nhân viên để ngăn họ tham gia công đoàn.", descriptionEn: "Private companies proactively provide insurance and housing to deter unionization.", stats: { power: 2, economic: 4, cultural: 1 } },
          { name: "Tự do Cánh tả (Left-Rothbardianism)", nameEn: "Left-Rothbardianism", description: "Nếu xóa nhà nước, tập đoàn sẽ sụp đổ. Thị trường tự do thuần túy tạo bình đẳng cho lao động.", descriptionEn: "If the state is erased, corporations collapse. Pure free markets create labor equality.", stats: { power: -9, civil: -8, economic: 4, cultural: -5 } },
          { name: "Tư tưởng Hồ Chí Minh (Ho Chi Minh Thought)", nameEn: "Ho Chi Minh Thought", description: "Kết hợp Chủ nghĩa Mác-Lenin với truyền thống Việt Nam. Đề cao độc lập dân tộc, Đảng lãnh đạo, tiến lên XHCN linh hoạt.", descriptionEn: "Combines Marxism-Leninism with Vietnamese traditions. Emphasizes national independence, Party leadership, flexible advance to Socialism.", stats: { power: 7, political: 8, diplomatic: 6, economic: -6, religious: -4, cultural: -2, societal: 5 } },
          { name: "Cộng sản Tôn giáo (Religious Communism)", nameEn: "Religious Communism", description: "Xóa bỏ tư hữu và sống quần tụ bình đẳng, hoàn toàn dựa trên nền tảng giáo lý và tình yêu thương của tôn giáo.", descriptionEn: "Abolishes private property and lives in egalitarian communes, entirely based on religious doctrine and love.", stats: { power: -4, political: -2, economic: -10, religious: 10, cultural: 6 } },
          { name: "Cộng sản Nguyên thủy (Primitive Communism)", nameEn: "Primitive Communism", description: "Thời tiền sử. Không giai cấp, không nhà nước, không tư hữu, sống thành các bộ lạc săn bắt hái lượm.", descriptionEn: "Prehistoric era. Classless, stateless, no private property, living in hunter-gatherer tribes.", stats: { power: -10, political: -8, economic: -10, cultural: 8, societal: -2 } },
          { name: "Cộng sản Cánh tả (Left Communism)", nameEn: "Left Communism", description: "Ủng hộ cách mạng vô sản nhưng chống độc tài kiểu Stalin. Ưu tiên hội đồng công nhân tự phát hơn đảng phái.", descriptionEn: "Supports proletarian revolution but opposes Stalinist dictatorship. Prioritizes spontaneous workers' councils over parties.", stats: { power: -5, political: -6, diplomatic: -8, economic: -10, cultural: -5 } },
          { name: "Chủ nghĩa Stalin (Stalinism)", nameEn: "Stalinism", description: "Toàn trị tột độ. Tập trung kinh tế tối đa, sùng bái cá nhân và sử dụng khủng bố để triệt tiêu mọi đối lập.", descriptionEn: "Extreme totalitarianism. Maximum economic centralization, cult of personality, and terror to eliminate opposition.", stats: { power: 10, political: 10, diplomatic: 8, military: 9, civil: 10, economic: -10, religious: -9, cultural: 4 } },
          { name: "Bảo thủ Quốc gia (National Conservatism)", nameEn: "National Conservatism", description: "Giữa Bảo thủ và Độc tài Vị quốc. Bảo vệ mạnh mẽ chủ quyền, chống nhập cư, đòi hỏi đồng hóa nhưng vẫn giữ dân chủ.", descriptionEn: "Between Conservatism and Authoritarian Nationalism. Protects sovereignty, anti-immigration, demands assimilation but keeps democracy.", stats: { power: 5, political: 2, diplomatic: 8, civil: 4, economic: 2, cultural: 8, societal: 8 } },
          { name: "Dân chủ Kỹ trị (Techno-Democracy)", nameEn: "Techno-Democracy", description: "Sử dụng công nghệ để mở rộng sự tham gia trực tiếp của dân vào chính trị (bầu cử điện tử, minh bạch dữ liệu).", descriptionEn: "Uses technology to expand direct citizen participation in politics (e-voting, transparent data).", stats: { power: -4, political: -8, civil: -5, cultural: -6 } },
          { name: "Tự do Phái sinh Cánh tả (Left-Libertarianism)", nameEn: "Left-Libertarianism", description: "Thị trường tự do tuyệt đối, nhưng tập trung vào việc trao quyền cho công đoàn và nhóm thiểu số chống lại tư bản độc quyền.", descriptionEn: "Absolute free market, but focused on empowering unions and minorities against monopoly capitalism.", stats: { power: -8, political: -5, civil: -8, economic: 3, cultural: -7, societal: -6 } },
          { name: "Sinh thái Tiên phong (Eco-Vanguardism)", nameEn: "Eco-Vanguardism", description: "Bảo vệ môi trường là số 1. Sẵn sàng dùng nhà nước độc tài khẩn cấp để áp đặt quy định xanh và tiêu diệt ngành ô nhiễm.", descriptionEn: "Environment is #1. Willing to use an emergency dictatorial state to impose green rules and destroy polluting industries.", stats: { power: 8, political: 7, economic: -6, cultural: -4, societal: 0 } },
          { name: "Tư bản Cổ hữu (Paleocapitalism)", nameEn: "Paleocapitalism", description: "Thị trường tự do tàn nhẫn kiểu thế kỷ 19. Không luật lao động, cá nhân tự chịu trách nhiệm với sự sống còn.", descriptionEn: "Ruthless 19th-century free markets. No labor laws, individuals are solely responsible for their survival.", stats: { power: -5, civil: -3, economic: 10, cultural: 6 } },
          { name: "Dân chủ Cơ sở (Grassroots Democracy)", nameEn: "Grassroots Democracy", description: "Mọi quyền lực chính trị phải xuất phát từ cấp độ thấp nhất (khu phố, làng xã). Chống can thiệp của chính phủ trung ương.", descriptionEn: "All political power must stem from the lowest level (neighborhoods, villages). Opposes central gov intervention.", stats: { power: -9, political: -9, economic: -2, cultural: -2 } }
        ];

        // 60 CÂU HỎI (Đã thêm textEn - dịch mẫu 10 câu đầu)
        const rawQuestions = [
          { text: "Về biến đổi khí hậu, cứ để thị trường tự do và đổi mới công nghệ tự giải quyết sẽ tốt hơn là nhà nước ra lệnh cấm đoán.", textEn: "For climate change, it's better to let the free market and tech innovation solve it rather than state bans.", effects: { economic: 1, power: -0.5 } }, 
          { text: "Việc chỉnh sửa gen hoặc cấy ghép máy móc vào não người là vi phạm các quy luật tự nhiên thiêng liêng, cần phải bị cấm kịch liệt.", textEn: "Gene editing or implanting machines in the human brain violates sacred natural laws and must be strictly banned.", effects: { cultural: 1.5, religious: 1, power: 0.5 } },
          { text: "Nếu một chính sách được dữ liệu khoa học chứng minh là hiệu quả tuyệt đối, ta phải áp dụng ngay dù nó vi phạm dân chủ hay tự do.", textEn: "If a policy is scientifically proven to be absolutely effective, it must be applied immediately even if it violates democracy or freedom.", effects: { power: 1.5, political: 1.5, civil: 1 } },
          { text: "Một xã hội lý tưởng là nơi mọi công dân đều là quân nhân, và quân đội điều hành luôn các vấn đề của đất nước.", textEn: "An ideal society is where every citizen is a soldier, and the military runs all affairs of the country.", effects: { military: 2, power: 1, civil: 1 } }, 
          { text: "Chính phủ và các tập đoàn lớn luôn cấu kết tham nhũng để bóc lột người dân; cần dỡ bỏ cả hai để công nhân tự do buôn bán.", textEn: "Governments and big corporations always collude to exploit the people; both should be dismantled for free worker trade.", effects: { power: -1.5, economic: -0.5, political: -1 } }, 
          { text: "Mọi sinh vật (động vật, cây cỏ) đều có quyền sống bình đẳng như con người; nhân loại không có đặc quyền tàn phá chúng vì lợi ích riêng.", textEn: "All living beings (animals, plants) have equal rights to life as humans; humanity has no privilege to destroy them for selfish gain.", effects: { economic: -1.5, cultural: -1 } }, 
          { text: "Các cộng đồng nên được tự do tách biệt và sống theo sắc tộc/văn hóa riêng của họ mà không bị ép buộc phải đa dạng hòa nhập.", textEn: "Communities should be free to segregate and live by their own ethnicity/culture without forced diversity integration.", effects: { societal: 1.5, power: -1 } }, 
          { text: "Nhà nước nên can thiệp bảo vệ người lao động và cấp y tế, nhưng vẫn phải giữ kỷ luật sắt và các giá trị văn hóa truyền thống cứng rắn.", textEn: "The state should intervene to protect workers and provide healthcare, but must maintain iron discipline and strict traditional cultural values.", effects: { economic: -1, cultural: 1.5, power: 1 } }, 
          { text: "Kể cả các định luật vật lý như trọng lực cũng là một dạng áp bức; con người cần tìm mọi cách để giải phóng tâm trí khỏi thực tại.", textEn: "Even physical laws like gravity are a form of oppression; humans must find ways to free their minds from reality.", effects: { cultural: -2, religious: -2, civil: -1 } }, 
          { text: "Không có hệ tư tưởng nào là hoàn hảo. Một chính phủ tốt là biết chắp vá linh hoạt mọi chính sách miễn sao dân no ấm và phát triển.", textEn: "No ideology is perfect. A good government flexibly patches together any policy as long as the people are prosperous.", effects: { political: 0.5, diplomatic: 0 } }, 
          
          // (DỊCH MẪU ĐẾN ĐÂY. CÁC CÂU DƯỚI TÔI TẠM ĐỂ GIỐNG TEXT TIẾNG VIỆT ĐỂ BẠN DỊCH SAU. BẠN CHỈ CẦN SỬA PHẦN textEn CỦA TỪNG DÒNG)
          { text: "Một quốc gia cần hiện đại hóa và thế tục hóa triệt để, thậm chí dùng quân đội ép dân từ bỏ tôn giáo để tiến bộ.", textEn: "A nation needs radical modernization and secularization, even using the army to force citizens to abandon religion for progress.", effects: { power: 1, religious: -1.5, cultural: -1 } }, 
          { text: "Để giải quyết nghèo đói, thay vì chờ nhà nước phát phúc lợi, ta nên để các tổ chức tôn giáo và hội thiện nguyện tư nhân lo liệu.", textEn: "To solve poverty, instead of waiting for state welfare, we should let religious organizations and private charities handle it.", effects: { economic: 1, religious: 1.5, power: -0.5 } }, 
          { text: "Môi trường công sở cũng phải áp dụng dân chủ: Nhân viên có quyền biểu quyết sa thải giám đốc và quyết định chiến lược công ty.", textEn: "Workplaces must also apply democracy: Employees have the right to vote to fire the CEO and decide company strategy.", effects: { political: -1.5, economic: -1 } }, 
          { text: "Luật pháp do con người tạo ra là sự kiêu ngạo; con người chỉ nên sống tự do và phục tùng duy nhất các phán quyết của Thượng Đế.", textEn: "Man-made laws are arrogant; humans should live freely and submit only to the judgments of God.", effects: { power: -1.5, civil: -1, religious: 2 } }, 
          { text: "Nhà nước nên hỗ trợ các tập đoàn công nghệ lớn thu thập dữ liệu sinh trắc học của mọi công dân để loại bỏ hoàn toàn mầm mống tội phạm.", textEn: "The state should support big tech in collecting biometric data of all citizens to completely eliminate the seeds of crime.", effects: { power: 1.5, civil: 2, cultural: -0.5 } }, 
          { text: "Nền dân chủ bầu cử là tốt, nhưng quốc hội tuyệt đối không được phép thông qua bất kỳ luật nào trái với giáo lý của tôn giáo đa số.", textEn: "Electoral democracy is good, but parliament must absolutely not pass any law contrary to the dogma of the majority religion.", effects: { political: -0.5, civil: 1, religious: 2, cultural: 1.5 } }, 
          { text: "Tự do cá nhân và kinh tế mở là tuyệt vời, nhưng ta phải đóng chặt biên giới lại để bảo vệ dân tộc khỏi văn hóa ngoại lai.", textEn: "Individual freedom and open economies are great, but we must seal the borders to protect the nation from foreign culture.", effects: { economic: 1, diplomatic: 1.5, societal: 1.5, civil: -0.5 } }, 
          { text: "Chủ nghĩa tư bản tàn phá Trái Đất vì lợi nhuận; chỉ có một chính quyền trung ương tịch thu và kế hoạch hóa kinh tế mới cứu được tự nhiên.", textEn: "Capitalism destroys Earth for profit; only a central authority confiscating and planning the economy can save nature.", effects: { economic: -2, power: 1 } }, 
          { text: "Các công ty tư nhân lớn nên tự lo nhà ở, trường học, bệnh viện cho nhân viên của mình để họ không cần dựa dẫm vào chính phủ hay công đoàn.", textEn: "Large private companies should provide housing, schools, and hospitals for their employees so they don't rely on gov or unions.", effects: { economic: 1.5, power: 0.5 } }, 
          { text: "Cá nhân tự do là tốt, nhưng sự ràng buộc về nghĩa vụ chăm sóc gia đình, họ hàng và cộng đồng địa phương quan trọng hơn tham vọng cá nhân.", textEn: "Individual freedom is good, but the obligation to care for family, relatives, and local community is more important than personal ambition.", effects: { civil: 1, cultural: 1, societal: 1 } }, 
          { text: "Sự phát triển của AI đang hủy hoại bản chất con người; ta nên quay về lối sống đơn giản, bài trừ công nghệ.", textEn: "AI development is destroying human nature; we should return to a simple lifestyle and reject technology.", effects: { cultural: 1, economic: -0.5 } },
          { text: "Đất đai thuộc về tự nhiên; ai chiếm hữu nó để sinh lời phải trả một khoản thuế đất cực cao cho xã hội.", textEn: "Land belongs to nature; anyone who occupies it for profit must pay an extremely high land tax to society.", effects: { economic: -0.5, power: 0.5 } },

          { text: "Sự đa dạng về sắc tộc và văn hóa là sức mạnh cốt lõi làm cho một cộng đồng trở nên vĩ đại.", textEn: "Ethnic and cultural diversity is the core strength that makes a community great.", effects: { societal: -1 } },
          { text: "Một chính quyền trung ương mạnh là cần thiết để quy hoạch hạ tầng và phát triển đồng bộ toàn quốc.", textEn: "A strong central government is necessary for nationwide infrastructure planning and synchronized development.", effects: { power: 1 } }
        ];

        // Tùy chọn Trả lời
        const options = [
          { label: "Rất đồng tình", labelEn: "Strongly Agree", value: 2 },
          { label: "Đồng tình", labelEn: "Agree", value: 1 },
          { label: "Trung lập", labelEn: "Neutral", value: 0 },
          { label: "Phản đối", labelEn: "Disagree", value: -1 },
          { label: "Rất phản đối", labelEn: "Strongly Disagree", value: -2 }
        ];

        function shuffleArray(array) {
          let shuffled = [...array];
          for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
          }
          return shuffled;
        }

        const RadarChart = ({ results, axes, lang, t }) => {
          const size = 320;
          const center = size / 2;
          const radius = size / 2 - 40; 
          const sides = axes.length;
          const angleStep = (Math.PI * 2) / sides;

          const getPoint = (value, index) => {
            const angle = index * angleStep - Math.PI / 2;
            const x = center + radius * value * Math.cos(angle);
            const y = center + radius * value * Math.sin(angle);
            return `${x},${y}`;
          };

          const levels = 5;
          const gridPolygons = Array.from({ length: levels }).map((_, i) => {
            const value = (i + 1) / levels;
            const points = axes.map((_, idx) => getPoint(value, idx)).join(' ');
            return <polygon key={i} points={points} fill={i % 2 === 0 ? "rgba(241, 245, 249, 0.5)" : "none"} stroke="#cbd5e1" strokeWidth="1" />;
          });

          const axisLines = axes.map((_, idx) => {
            const point = getPoint(1, idx);
            return <line key={idx} x1={center} y1={center} x2={point.split(',')[0]} y2={point.split(',')[1]} stroke="#cbd5e1" strokeWidth="1" strokeDasharray="3 3" />;
          });

          const dataPoints = axes.map((axis, idx) => {
            const score = results[axis.id]; 
            const intensity = Math.abs(score) / 10; 
            return getPoint(intensity, idx);
          }).join(' ');

          const labels = axes.map((axis, idx) => {
            const score = results[axis.id];
            
            // Xử lý đa ngôn ngữ cho nhãn trên Radar
            const rightText = lang === 'vi' ? axis.right : axis.rightEn;
            const leftText = lang === 'vi' ? axis.left : axis.leftEn;
            const labelText = score > 0 ? rightText : (score < 0 ? leftText : t.balanced);
            const isStrong = Math.abs(score) >= 5;
            
            const angle = idx * angleStep - Math.PI / 2;
            const x = center + (radius + 22) * Math.cos(angle);
            const y = center + (radius + 15) * Math.sin(angle);
            
            return (
              <text key={idx} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fontSize="10" fontWeight={isStrong ? "800" : "500"} fill={isStrong ? "#0f172a" : "#64748b"}>
                {labelText}
              </text>
            );
          });

          return (
            <svg width="100%" height="100%" viewBox={`0 0 ${size} ${size}`} className="overflow-visible w-full max-w-[280px] mx-auto">
              {gridPolygons}
              {axisLines}
              <polygon points={dataPoints} fill="rgba(16, 185, 129, 0.25)" stroke="#10b981" strokeWidth="2.5" strokeLinejoin="round" />
              {axes.map((axis, idx) => {
                 const intensity = Math.abs(results[axis.id]) / 10;
                 const pt = getPoint(intensity, idx).split(',');
                 return <circle key={idx} cx={pt[0]} cy={pt[1]} r="4" fill="#059669" />
              })}
              {labels}
            </svg>
          );
        };

        function App() {
          // STATE MỚI ĐỂ CHUYỂN NGÔN NGỮ
          const [lang, setLang] = useState('vi');
          const t = tUI[lang]; // Lấy dictionary theo ngôn ngữ hiện tại

          const [currentQuestion, setCurrentQuestion] = useState(0);
          const [answers, setAnswers] = useState({});
          const [showResults, setShowResults] = useState(false);
          const [hasStarted, setHasStarted] = useState(false);
          
          const [showAllIdeologies, setShowAllIdeologies] = useState(false);
          const [searchTerm, setSearchTerm] = useState("");
          const [expandedIdeo, setExpandedIdeo] = useState(null);
          const [expandedAxis, setExpandedAxis] = useState(null);
          
          const [stats, setStats] = useState({ totalVotes: 0, currentIdeoVotes: 0 });
          const [isSaving, setIsSaving] = useState(false);
          
          const [allRecords, setAllRecords] = useState([]);
          const [showGodMode, setShowGodMode] = useState(false);
          const [secretCode, setSecretCode] = useState("");

          const questions = useMemo(() => shuffleArray(rawQuestions), []);

          const toggleLang = () => {
              setLang(lang === 'vi' ? 'en' : 'vi');
          };

          const resetQuiz = () => {
            setAnswers({});
            setCurrentQuestion(0);
            setShowResults(false);
            setHasStarted(false);
            setShowAllIdeologies(false);
            setExpandedAxis(null);
            setSearchTerm("");
            setExpandedIdeo(null);
            setShowGodMode(false);
            window.scrollTo(0, 0);
          };

          const handleOptionClick = (value) => {
            setAnswers({ ...answers, [currentQuestion]: value });
            if (currentQuestion < questions.length - 1) {
              setTimeout(() => setCurrentQuestion(currentQuestion + 1), 200);
            } else {
              setTimeout(() => processResultsAndSave(), 300);
            }
          };

          const calculateScores = () => {
            let scores = {};
            let maxPossibleScores = {};
            axes.forEach(axis => { scores[axis.id] = 0; maxPossibleScores[axis.id] = 0; });

            questions.forEach((q, index) => {
              const userValue = answers[index];
              if (userValue !== undefined && userValue !== 0) {
                for (const [axisId, effectValue] of Object.entries(q.effects)) {
                  scores[axisId] += userValue * effectValue;
                }
              }
              for (const [axisId, effectValue] of Object.entries(q.effects)) {
                maxPossibleScores[axisId] += 2 * Math.abs(effectValue);
              }
            });

            let finalScores = {};
            axes.forEach(axis => {
              const max = maxPossibleScores[axis.id];
              if (max === 0) finalScores[axis.id] = 0;
              else finalScores[axis.id] = parseFloat(((scores[axis.id] / max) * 10).toFixed(1));
            });
            return finalScores;
          };

          const calculateMatchPercentage = (ideo, userScores) => {
            let sumOfSquares = 0;
            axes.forEach(axis => {
              const targetScore = ideo.stats[axis.id] !== undefined ? ideo.stats[axis.id] : 0;
              const uScore = userScores[axis.id] || 0;
              sumOfSquares += Math.pow(uScore - targetScore, 2);
            });
            const distance = Math.sqrt(sumOfSquares);
            return Math.max(0, (1 - distance / 60) * 100).toFixed(1);
          };

          const findClosestIdeologies = (userScores) => {
            const calculatedIdeologies = ideologies.map(ideo => {
              let sumOfSquares = 0;
              axes.forEach(axis => {
                const targetScore = ideo.stats[axis.id] !== undefined ? ideo.stats[axis.id] : 0;
                const uScore = userScores[axis.id] || 0;
                sumOfSquares += Math.pow(uScore - targetScore, 2);
              });
              const distance = Math.sqrt(sumOfSquares);
              const matchPercentage = Math.max(0, (1 - distance / 60) * 100);
              
              return { ...ideo, distance: distance, matchPercentage: matchPercentage };
            });
            return calculatedIdeologies.sort((a, b) => a.distance - b.distance);
          };

          const processResultsAndSave = async () => {
            setIsSaving(true);
            setShowResults(true);
            window.scrollTo(0, 0);

            const userScores = calculateScores();
            const topMatch = findClosestIdeologies(userScores)[0];
            
            // LUÔN LUÔN SỬ DỤNG TÊN TIẾNG VIỆT LÀM KEY DATABASE ĐỂ KHÔNG BỊ CHIA CẮT STATS
            const standardDBName = topMatch.name; 

            if (db) {
                try {
                    const newRecordRef = db.ref('results').push();
                    await newRecordRef.set({
                        ideology: standardDBName,
                        scores: userScores,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    });

                    const statsRef = db.ref('stats/ideologies');
                    statsRef.transaction((currentData) => {
                        if (currentData === null) {
                            return { totalVotes: 1, [standardDBName]: 1 };
                        } else {
                            currentData.totalVotes = (currentData.totalVotes || 0) + 1;
                            currentData[standardDBName] = (currentData[standardDBName] || 0) + 1;
                            return currentData;
                        }
                    }, (error, committed, snapshot) => {
                        if (error) {
                            console.error("Transaction failed abnormally!", error);
                            setStats({ totalVotes: 0, currentIdeoVotes: 0, error: true });
                        } else if (committed) {
                            const newData = snapshot.val();
                            setStats({ totalVotes: newData.totalVotes, currentIdeoVotes: newData[standardDBName] });
                        }
                        setIsSaving(false);
                    });
                } catch (error) {
                    console.error("Lỗi khi lưu Firebase:", error);
                    setStats({ totalVotes: 0, currentIdeoVotes: 0, error: true });
                    setIsSaving(false);
                }
            } else {
                setIsSaving(false);
                setStats({ totalVotes: 0, currentIdeoVotes: 0, error: t.notConfigured });
            }
          };

          const unlockGodMode = () => {
             if (secretCode === "123456" && db) {
                 try {
                     const resultsRef = db.ref('results').orderByChild('timestamp').limitToLast(50);
                     resultsRef.once('value', (snapshot) => {
                         const records = [];
                         snapshot.forEach((childSnapshot) => {
                             records.push({ id: childSnapshot.key, ...childSnapshot.val() });
                         });
                         setAllRecords(records.reverse());
                         setShowGodMode(true);
                     });
                 } catch (error) {
                     alert("Lỗi khi tải dữ liệu.");
                 }
             } else {
                 alert("Sai mã bí mật hoặc chưa kết nối Firebase!");
             }
          };

          // NÚT CHUYỂN NGÔN NGỮ CHUNG (Được gắn ở góc)
          const LangToggle = () => (
             <div className="absolute top-4 right-4 md:top-6 md:right-6">
                <button 
                   onClick={toggleLang}
                   className="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold px-3 py-1.5 rounded-full text-xs shadow-sm transition-colors border border-slate-200"
                >
                   <span>🇻🇳 VI</span>
                   <div className={`w-6 h-3 bg-slate-300 rounded-full relative flex items-center p-0.5 transition-all ${lang==='en' ? 'bg-indigo-300' : ''}`}>
                      <div className={`w-2.5 h-2.5 bg-white rounded-full shadow-sm transition-all ${lang==='en' ? 'translate-x-3' : ''}`}></div>
                   </div>
                   <span>🇬🇧 EN</span>
                </button>
             </div>
          );

          if (!hasStarted) {
             return (
                <div className="max-w-3xl mx-auto mt-16 p-8 bg-white rounded-[2.5rem] shadow-2xl text-center border border-slate-100 relative">
                    <LangToggle />
                    <div className="inline-block px-5 py-2 bg-slate-900 text-white rounded-full text-xs font-bold uppercase tracking-widest mb-6 shadow-md mt-6">
                      {t.subtitle}
                    </div>
                    <h1 className="text-4xl md:text-5xl font-black mb-6 text-slate-800 tracking-tight leading-tight">{t.title1} <br/><span className="text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-500">{t.title2}</span></h1>
                    
                    <p className="text-lg text-slate-600 mb-10 mt-2 leading-relaxed px-4">
                       {t.desc}
                    </p>
                    <button onClick={() => setHasStarted(true)} className="px-12 py-5 bg-gradient-to-r from-emerald-600 to-teal-600 text-white text-xl font-bold rounded-2xl shadow-xl shadow-teal-500/30 hover:shadow-teal-500/50 transition-all hover:-translate-y-1 active:translate-y-0">{t.startBtn}</button>
                </div>
             );
          }

          if (showResults) {
            const results = calculateScores();
            const sortedIdeologies = findClosestIdeologies(results);
            const topMatch = sortedIdeologies[0];
            const runnerUps = sortedIdeologies.slice(1, 4); 

            // Lấy tên theo ngôn ngữ đang chọn
            const topMatchName = lang === 'vi' ? topMatch.name : (topMatch.nameEn || topMatch.name);
            const topMatchDesc = lang === 'vi' ? topMatch.description : (topMatch.descriptionEn || topMatch.description);

            return (
              <div className="max-w-6xl mx-auto p-4 md:p-8 bg-slate-50 min-h-screen relative">
                <LangToggle />
                <h1 className="text-3xl md:text-4xl font-extrabold mb-3 text-center text-slate-900 mt-6 md:mt-0">{t.reportTitle}</h1>
                <p className="text-center mb-10 text-slate-500 font-medium">{t.reportDesc}</p>
                
                {/* TOP 1 MATCH */}
                <div className="bg-slate-900 text-white p-8 md:p-12 rounded-[2rem] mb-6 shadow-2xl relative overflow-hidden border border-slate-800">
                  <div className="absolute -top-20 -right-20 p-10 opacity-5 rotate-45 scale-150">
                     <svg width="300" height="300" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 22h20L12 2zm0 3.8l7.5 14.2H4.5L12 5.8z"/></svg>
                  </div>
                  <div className="relative z-10 flex items-center justify-between">
                    <div className="flex-1">
                      <div className="flex items-center gap-4 mb-4">
                         <span className="text-emerald-400 font-bold tracking-widest uppercase text-sm">{t.bestMatch}</span>
                         <span className="text-xs bg-emerald-900/50 px-3 py-1.5 rounded-full text-emerald-400 font-bold shadow-inner border border-emerald-500/30">
                            {t.matchRate} {topMatch.matchPercentage.toFixed(1)}%
                         </span>
                      </div>
                      <h2 className="text-4xl md:text-5xl font-black mb-5 text-white tracking-tight">{topMatchName}</h2>
                      <p className="text-slate-300 leading-relaxed text-lg lg:text-xl max-w-3xl">{topMatchDesc}</p>
                    </div>
                  </div>
                </div>

                {/* THỐNG KÊ ĐÁM MÂY */}
                <div className="mb-10 bg-indigo-50 border border-indigo-100 p-5 rounded-2xl flex items-center gap-4 shadow-sm animate-in fade-in duration-500">
                    <div className="w-12 h-12 bg-indigo-500 rounded-full flex items-center justify-center text-white shrink-0 shadow-inner">
                       <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
                    </div>
                    <div>
                       <h4 className="font-bold text-indigo-900">{t.cloudStats}</h4>
                       {isSaving ? (
                          <p className="text-indigo-700 text-sm mt-1 animate-pulse">{t.syncing}</p>
                       ) : stats.error ? (
                          <p className="text-red-600 text-sm mt-1">{t.notConfigured}</p>
                       ) : (
                          stats.totalVotes < 5 ? (
                             <p className="text-indigo-700 text-sm mt-1">
                                {t.collecting}<strong>{stats.totalVotes}</strong>{t.collecting2}
                             </p>
                          ) : (
                             <p className="text-indigo-700 text-sm mt-1">
                                {t.stat1}<strong>{stats.totalVotes}</strong>{t.stat2}<strong>{stats.currentIdeoVotes}</strong>{t.stat3}<strong>{((stats.currentIdeoVotes / stats.totalVotes) * 100).toFixed(1)}%</strong>).
                             </p>
                          )
                       )}
                    </div>
                </div>

                {/* LAYOUT CHIA CỘT */}
                <div className="flex flex-col lg:flex-row gap-8 mb-10">
                   {/* CỘT TRÁI */}
                   <div className="w-full lg:w-1/3 flex flex-col gap-6">
                      <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 flex flex-col">
                         <div className="text-center mb-4">
                            <h3 className="text-lg font-bold text-slate-800">{t.radarTitle}</h3>
                            <p className="text-[11px] text-slate-400 mt-1 uppercase tracking-widest font-bold">
                              {t.radarSub}
                            </p>
                         </div>
                         <RadarChart results={results} axes={axes} lang={lang} t={t} />
                      </div>

                      <div className="bg-transparent mt-2">
                         <h3 className="text-sm font-bold text-slate-500 mb-4 px-2 uppercase tracking-widest">{t.runnerUps}</h3>
                         <div className="flex flex-col gap-4">
                           {runnerUps.map((ideo, idx) => (
                              <div key={idx} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md hover:border-emerald-300 transition-all group">
                                 <div className="flex justify-between items-center mb-2">
                                    <span className="text-[11px] font-bold bg-emerald-50 text-emerald-600 px-2 py-1 rounded">{t.matchRank} {idx + 2}</span>
                                    <span className="text-[11px] font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded border border-emerald-100">
                                       {ideo.matchPercentage.toFixed(1)}%
                                    </span>
                                 </div>
                                 <h4 className="font-bold text-slate-800 mb-2 leading-tight text-[15px] group-hover:text-emerald-600 transition-colors">
                                    {lang === 'vi' ? ideo.name : (ideo.nameEn || ideo.name)}
                                 </h4>
                                 <p className="text-[13px] text-slate-500 leading-relaxed line-clamp-3">
                                    {lang === 'vi' ? ideo.description : (ideo.descriptionEn || ideo.description)}
                                 </p>
                              </div>
                           ))}
                         </div>
                      </div>
                   </div>

                   {/* CỘT PHẢI: CHI TIẾT 9 TRỤC */}
                   <div className="w-full lg:w-2/3">
                      <div className="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-200 h-full">
                         <h3 className="text-xl font-bold text-slate-800 mb-8 px-2 border-b border-slate-100 pb-4">{t.axesDetail}</h3>
                         
                         <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-7">
                            {axes.map(axis => {
                              const score = results[axis.id];
                              const markerPosition = ((score + 10) / 20) * 100;
                              const isExpanded = expandedAxis === axis.id;

                              return (
                                <div key={axis.id} className="transition-all">
                                  <div 
                                    className="flex justify-between items-end mb-3 cursor-pointer group"
                                    onClick={() => setExpandedAxis(isExpanded ? null : axis.id)}
                                  >
                                    <span className={`text-[13px] font-bold w-[35%] text-left transition-colors ${score < 0 ? 'text-slate-900 group-hover:text-emerald-600' : 'text-slate-400 group-hover:text-slate-600'}`}>
                                       {lang === 'vi' ? axis.left : axis.leftEn}
                                    </span>
                                    
                                    <div className="w-[30%] flex flex-col items-center justify-center">
                                       <span className="text-[10px] tracking-widest uppercase text-slate-500 font-extrabold bg-slate-50 px-3 py-1 rounded-lg text-center border border-slate-100 group-hover:bg-slate-200 transition-colors flex items-center gap-1">
                                          {lang === 'vi' ? axis.name : axis.nameEn}
                                          <svg className={`w-3 h-3 transition-transform ${isExpanded ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                                       </span>
                                    </div>

                                    <span className={`text-[13px] font-bold w-[35%] text-right transition-colors ${score > 0 ? 'text-slate-900 group-hover:text-emerald-600' : 'text-slate-400 group-hover:text-slate-600'}`}>
                                       {lang === 'vi' ? axis.right : axis.rightEn}
                                    </span>
                                  </div>
                                  
                                  {isExpanded && (
                                    <div className="mb-4 p-3 bg-slate-800 text-slate-200 text-xs rounded-xl shadow-inner animate-in fade-in slide-in-from-top-2 duration-200 leading-relaxed font-medium">
                                      {lang === 'vi' ? axis.description : axis.descriptionEn}
                                    </div>
                                  )}
                                  
                                  <div className="relative h-10 w-full flex items-center bg-slate-50 rounded-xl px-2">
                                    <div className="absolute w-[calc(100%-16px)] h-1.5 bg-slate-200 rounded-full shadow-inner"></div>
                                    <div className="absolute left-1/2 w-0.5 h-4 bg-slate-300 -translate-x-1/2 rounded-full"></div>
                                    <div 
                                      className={`absolute h-1.5 rounded-full ${axis.color} opacity-80 shadow-sm`}
                                      style={{ left: score < 0 ? `calc(${markerPosition}% + 8px)` : '50%', width: `calc(${Math.abs(score) / 20 * 100}% - 8px)` }}
                                    ></div>
                                    <div 
                                      className={`absolute w-7 h-7 ${axis.color} rounded-full flex items-center justify-center shadow-lg border-2 border-white z-10`}
                                      style={{ left: `calc(${markerPosition}% - 6px)` }}
                                    >
                                       <span className="text-[9px] font-bold text-white shadow-sm">{score > 0 ? `+${score}` : score}</span>
                                    </div>
                                  </div>
                                </div>
                              );
                            })}
                         </div>
                      </div>
                   </div>
                </div>
                
                {/* BUTTONS */}
                <div className="mt-8 mb-16 flex flex-col items-center gap-4">
                   <button 
                     onClick={() => setShowAllIdeologies(true)}
                     className="px-8 py-4 bg-white border-2 border-slate-200 text-slate-700 font-bold rounded-2xl hover:bg-slate-50 hover:border-emerald-400 transition-all text-sm shadow-sm w-full md:w-auto"
                   >
                     {t.openLib}
                   </button>
                   
                   <button 
                     onClick={resetQuiz}
                     className="px-8 py-3 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition-all text-sm shadow-lg hover:shadow-xl w-full md:w-auto active:scale-95"
                   >
                     {t.retry}
                   </button>
                </div>

                {/* MODAL FULL-SCREEN BÁCH KHOA TOÀN THƯ */}
                {showAllIdeologies && (
                  <div className="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-6 animate-in fade-in duration-200">
                     <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => {setShowAllIdeologies(false); setSearchTerm(""); setExpandedIdeo(null);}}></div>
                     
                     <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-6xl max-h-[90vh] flex flex-col relative z-10 overflow-hidden animate-in zoom-in-95 duration-200">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center p-6 md:px-8 border-b border-slate-100 bg-slate-50 gap-4">
                           <div>
                             <h3 className="text-2xl font-black text-slate-800">{t.libTitle}</h3>
                           </div>
                           <div className="flex items-center gap-3 w-full md:w-auto">
                             <input 
                               type="text" 
                               placeholder={t.searchPH} 
                               value={searchTerm}
                               onChange={(e) => setSearchTerm(e.target.value)}
                               className="px-4 py-2 border border-slate-300 rounded-lg text-sm w-full md:w-64 focus:outline-none focus:ring-2 focus:ring-emerald-500"
                             />
                             <button onClick={() => {setShowAllIdeologies(false); setSearchTerm(""); setExpandedIdeo(null);}} className="w-10 h-10 flex-shrink-0 bg-slate-200 text-slate-600 rounded-full flex items-center justify-center hover:bg-red-100 hover:text-red-600 transition-colors font-bold text-lg">
                               ✕
                             </button>
                           </div>
                        </div>
                        
                        <div className="p-6 md:p-8 overflow-y-auto flex-1 bg-slate-50/50">
                           <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                              {ideologies.filter(ideo => {
                                  const nameToCheck = lang === 'vi' ? ideo.name : (ideo.nameEn || ideo.name);
                                  return nameToCheck.toLowerCase().includes(searchTerm.toLowerCase());
                              }).map((ideo, i) => {
                                 const isExpanded = expandedIdeo === ideo.name;
                                 const matchPct = calculateMatchPercentage(ideo, results);
                                 const iName = lang === 'vi' ? ideo.name : (ideo.nameEn || ideo.name);
                                 const iDesc = lang === 'vi' ? ideo.description : (ideo.descriptionEn || ideo.description);
                                 
                                 return (
                                   <div 
                                      key={i} 
                                      className={`border p-5 rounded-2xl bg-white transition-all cursor-pointer select-none
                                        ${isExpanded ? 'border-emerald-400 shadow-md ring-1 ring-emerald-400' : 'border-slate-200 hover:border-emerald-300 hover:shadow-sm'}`} 
                                      onClick={() => setExpandedIdeo(isExpanded ? null : ideo.name)}
                                   >
                                      <div className="flex justify-between items-center">
                                         <h4 className={`font-bold text-[15px] pr-2 ${isExpanded ? 'text-emerald-700' : 'text-slate-800'}`}>{iName}</h4>
                                         <span className={`text-xl leading-none w-6 h-6 flex-shrink-0 flex items-center justify-center rounded-full transition-colors ${isExpanded ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-400'}`}>
                                            {isExpanded ? '−' : '+'}
                                         </span>
                                      </div>
                                      
                                      {isExpanded && (
                                        <div className="mt-4 animate-in fade-in duration-200 border-t border-slate-100 pt-4 cursor-default" onClick={(e) => e.stopPropagation()}>
                                          <p className="text-[13px] text-slate-600 leading-relaxed font-medium mb-4">{iDesc}</p>
                                          
                                          <div className="mb-3 flex items-center gap-2">
                                             <span className="text-[11px] font-bold text-slate-500 uppercase tracking-widest">{t.matchRate}</span>
                                             <span className="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded text-xs font-bold border border-emerald-200">
                                               {matchPct}%
                                             </span>
                                          </div>

                                          <div className="flex flex-wrap gap-1.5 mt-2">
                                            <span className="w-full text-[10px] uppercase font-bold text-slate-400 mb-1 tracking-wider">{t.theoryCoords}</span>
                                            {Object.entries(ideo.stats).map(([key, val]) => {
                                              const axis = axes.find(a => a.id === key);
                                              if (!axis) return null;
                                              const colorClass = val > 0 ? "bg-red-50 text-red-700 border-red-100" : (val < 0 ? "bg-blue-50 text-blue-700 border-blue-100" : "bg-slate-100 text-slate-600 border-slate-200");
                                              
                                              const rightText = lang === 'vi' ? axis.right : axis.rightEn;
                                              const leftText = lang === 'vi' ? axis.left : axis.leftEn;
                                              const axisName = lang === 'vi' ? axis.name : axis.nameEn;
                                              const label = val > 0 ? rightText : (val < 0 ? leftText : t.balanced);

                                              return (
                                                <span key={key} className={`text-[10px] px-2 py-1 rounded border font-medium ${colorClass}`}>
                                                  <strong className="uppercase mr-1">{axisName}:</strong> {val > 0 ? '+'+val : val} ({label})
                                                </span>
                                              );
                                            })}
                                          </div>
                                        </div>
                                      )}
                                   </div>
                                 );
                              })}
                           </div>
                        </div>
                     </div>
                  </div>
                )}

                {/* KHU VỰC DÀNH CHO ADMIN */}
                <div className="mt-20 border-t border-slate-200 pt-8 max-w-sm mx-auto">
                    <h3 className="text-sm font-bold text-slate-400 text-center mb-4 uppercase tracking-widest">{t.adminArea}</h3>
                    {!showGodMode ? (
                        <div className="flex gap-2">
                           <input type="password" value={secretCode} onChange={e => setSecretCode(e.target.value)} placeholder={t.secretPH} className="flex-1 px-3 py-2 border rounded-lg text-sm" />
                           <button onClick={unlockGodMode} className="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold">{t.unlock}</button>
                        </div>
                    ) : (
                        <div className="bg-slate-800 p-4 rounded-xl text-white">
                           <h4 className="font-bold text-emerald-400 mb-3">{t.history}</h4>
                           <div className="space-y-2 max-h-60 overflow-y-auto pr-2">
                              {allRecords.length === 0 ? <p className="text-xs text-slate-400">Trống / Empty</p> : null}
                              {allRecords.map((rec, i) => {
                                 const dateStr = rec.timestamp ? new Date(rec.timestamp).toLocaleString() : 'N/A';
                                 return (
                                   <div key={i} className="bg-slate-700 p-2 rounded text-xs flex justify-between">
                                      <span className="text-emerald-300 font-bold">{rec.ideology}</span>
                                      <span className="text-slate-400 ml-2 text-[10px]">{dateStr}</span>
                                   </div>
                                 );
                              })}
                           </div>
                        </div>
                    )}
                </div>

              </div>
            );
          }

          const qText = lang === 'vi' ? questions[currentQuestion].text : (questions[currentQuestion].textEn || questions[currentQuestion].text);

          return (
            <div className="max-w-2xl mx-auto p-4 md:p-8 bg-white min-h-screen flex flex-col justify-center border-x border-slate-100 shadow-sm font-sans relative">
              <LangToggle />
              <div className="mb-10 mt-6 md:mt-0">
                <div className="flex justify-between text-xs font-bold text-slate-400 mb-3 uppercase tracking-widest">
                  <span>{t.progress}</span>
                  <span>{currentQuestion + 1} / {questions.length}</span>
                </div>
                <div className="w-full bg-slate-100 rounded-full h-2.5 shadow-inner p-0.5">
                  <div className="bg-gradient-to-r from-emerald-500 to-teal-500 h-1.5 rounded-full transition-all duration-300 ease-out" style={{ width: `${((currentQuestion) / questions.length) * 100}%` }}></div>
                </div>
              </div>

              <div className="text-center mb-10 min-h-[160px] flex items-center justify-center">
                <h2 className="text-2xl md:text-[28px] font-extrabold text-slate-800 leading-snug">"{qText}"</h2>
              </div>

              <div className="flex flex-col gap-3 md:gap-4">
                {options.map((option, index) => {
                  const oLabel = lang === 'vi' ? option.label : option.labelEn;
                  return (
                    <button
                      key={index}
                      onClick={() => handleOptionClick(option.value)}
                      className={`py-4 md:py-5 px-6 rounded-2xl border-2 font-bold text-lg transition-all duration-200
                        ${option.value === 2 ? 'border-emerald-500 text-emerald-700 bg-emerald-50/50 hover:bg-emerald-100' : 
                          option.value === 1 ? 'border-green-400 text-green-600 bg-green-50/50 hover:bg-green-100' :
                          option.value === 0 ? 'border-slate-200 text-slate-500 bg-slate-50 hover:bg-slate-100 hover:border-slate-300' :
                          option.value === -1 ? 'border-orange-400 text-orange-600 bg-orange-50/50 hover:bg-orange-100' :
                          'border-red-500 text-red-700 bg-red-50/50 hover:bg-red-100'
                        }
                        ${answers[currentQuestion] === option.value ? 'scale-[1.02] shadow-md ring-2 ring-offset-2 ring-slate-300 bg-white' : 'active:scale-95'}
                      `}
                    >
                      {oLabel}
                    </button>
                  );
                })}
              </div>
              
              {currentQuestion > 0 && (
                 <div className="mt-10 text-center">
                    <button onClick={() => setCurrentQuestion(currentQuestion - 1)} className="text-slate-400 hover:text-slate-800 font-bold underline decoration-2 underline-offset-4 text-sm transition-colors">{t.backBtn}</button>
                 </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
